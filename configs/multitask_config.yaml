# ============================================================
# Multi-Task Model — Training Configuration
# ============================================================

experiment:
  name: "multitask_v1"
  project: "ai-glass-cleanliness"
  tags: ["multitask", "segmentation", "regression", "unified"]
  notes: "Shared encoder with dual decoder heads for glass seg + dirt estimation"

paths:
  dataset_root: "dataset"
  checkpoint_dir: "checkpoints/multitask"
  log_dir: "logs/multitask"
  output_dir: "outputs/multitask"

dataset:
  image_dir: "dataset/images"
  glass_mask_dir: "dataset/glass_masks"
  dirt_map_dir: "dataset/dirt_maps"
  image_size: [512, 512]
  train_split: 0.80
  val_split: 0.15
  test_split: 0.05
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2

augmentations:
  train:
    horizontal_flip: true
    vertical_flip: false
    random_rotate_90: true
    random_brightness_contrast:
      brightness_limit: 0.3
      contrast_limit: 0.3
      p: 0.7
    gaussian_noise:
      var_limit: [10.0, 50.0]
      p: 0.3
    motion_blur:
      blur_limit: 7
      p: 0.2
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
  val:
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

model:
  encoder: "resnet50"
  encoder_weights: "imagenet"
  in_channels: 3
  # Segmentation head
  seg_decoder_channels: [256, 128, 64, 32, 16]
  seg_dropout: 0.2
  # Regression head
  reg_decoder_channels: [256, 128, 64, 32, 16]
  reg_dropout: 0.3
  # Feature Pyramid
  use_fpn: true
  fpn_out_channels: 256

loss:
  # Segmentation loss
  seg_bce_weight: 0.4
  seg_dice_weight: 0.4
  seg_focal_weight: 0.2
  seg_pos_weight: 2.0
  # Regression loss
  reg_mse_weight: 0.5
  reg_mae_weight: 0.3
  reg_ssim_weight: 0.2
  reg_mask_loss: true
  # Task balancing (learned uncertainty weighting — Kendall et al. 2018)
  task_balancing: "uncertainty"    # uncertainty | fixed | gradnorm
  # Fixed weights (used if task_balancing == fixed)
  seg_task_weight: 1.0
  reg_task_weight: 1.0

optimizer:
  type: "adamw"
  lr: 8.0e-5
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  encoder_lr_multiplier: 0.1

scheduler:
  type: "cosine_warmup"
  warmup_epochs: 8
  T_max: 92
  eta_min: 1.0e-8

training:
  epochs: 100
  batch_size: 6
  accumulate_grad_batches: 3       # effective batch = 18
  mixed_precision: true
  gradient_clip_val: 1.0
  early_stopping_patience: 25
  early_stopping_metric: "val/combined_score"
  early_stopping_mode: "max"
  log_every_n_steps: 10
  val_every_n_epochs: 1
  save_top_k: 3

metrics:
  seg_primary: "iou"
  reg_primary: "mae"
  combined_score_formula: "0.6*iou + 0.4*(1-mae_norm)"

inference:
  seg_threshold: 0.5
  smooth_dirt_map: true
  smooth_kernel_size: 5
  smooth_sigma: 1.0
  tta: false
